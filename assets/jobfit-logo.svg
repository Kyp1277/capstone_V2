<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 72" role="img" aria-labelledby="title desc">
  <title id="title">JobFit logo</title>
  <desc id="desc">JobFit brand logo for an AI CV match analyzer.</desc>
  <defs>
    <linearGradient id="jobfit-bg" x1="10" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="0.56" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="jobfit-sheet" x1="20" y1="15" x2="42" y2="49" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DFF7FF"/>
    </linearGradient>
    <filter id="jobfit-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="64" height="64" rx="18" fill="url(#jobfit-bg)"/>
  <path d="M20 50c7.9-3.4 13.5-7.7 17.3-13.5 3.6-5.4 8.1-8.9 14.7-10.5" fill="none" stroke="#A5F3FC" stroke-width="3" stroke-linecap="round" opacity=".72"/>
  <g filter="url(#jobfit-shadow)">
    <path d="M24 17h18l8 8v27a4 4 0 0 1-4 4H24a4 4 0 0 1-4-4V21a4 4 0 0 1 4-4Z" fill="url(#jobfit-sheet)"/>
    <path d="M42 17v7a2 2 0 0 0 2 2h6" fill="#BAE6FD"/>
    <path d="M28 30h11M28 37h16M28 44h8" fill="none" stroke="#1E3A8A" stroke-width="3" stroke-linecap="round"/>
  </g>
  <circle cx="53" cy="26" r="5" fill="#22C55E" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="23" cy="51" r="4" fill="#FBBF24" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="50" cy="51" r="6" fill="#0F172A" stroke="#FFFFFF" stroke-width="3"/>
  <path d="m45.7 50.6 2.8 2.8 6-7" fill="none" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="42" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="0">JobFit</text>
  <text x="86" y="59" fill="#155E75" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">AI CV MATCH ANALYZER</text>
