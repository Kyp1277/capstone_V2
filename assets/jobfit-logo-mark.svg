    <path d="M24 26h11M24 33h16M24 40h8" fill="none" stroke="#1E3A8A" stroke-width="3" stroke-linecap="round"/>
  </g>
  <circle cx="49" cy="22" r="5" fill="#22C55E" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="19" cy="47" r="4" fill="#FBBF24" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="46" cy="47" r="6" fill="#0F172A" stroke="#FFFFFF" stroke-width="3"/>
  <path d="m41.7 46.6 2.8 2.8 6-7" fill="none" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
