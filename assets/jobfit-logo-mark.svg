<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">JobFit logo mark</title>
  <desc id="desc">A document, check mark, and matching nodes for AI CV job matching.</desc>
  <defs>
    <linearGradient id="jobfit-bg" x1="10" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="0.56" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="jobfit-sheet" x1="20" y1="15" x2="42" y2="49" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DFF7FF"/>
    </linearGradient>
    <filter id="jobfit-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#jobfit-bg)"/>
  <path d="M16 46c7.9-3.4 13.5-7.7 17.3-13.5 3.6-5.4 8.1-8.9 14.7-10.5" fill="none" stroke="#A5F3FC" stroke-width="3" stroke-linecap="round" opacity=".72"/>
